<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
        }

        .header {
            background: linear-gradient(135deg, #0f2b1d, #1a472a);
            color: #fff;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .search-bar {
            flex: 1;
            max-width: 350px;
            display: flex;
        }

            .search-bar input {
                width: 100%;
                padding: 10px 15px;
                border: none;
                border-radius: 25px 0 0 25px;
            }

            .search-bar button {
                padding: 10px 20px;
                background: #ffd700;
                border: none;
                border-radius: 0 25px 25px 0;
                cursor: pointer;
            }

        .nav-icons a {
            color: white;
            font-size: 20px;
            margin-left: 15px;
            text-decoration: none;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200');
            background-size: cover;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .btn {
            padding: 12px 30px;
            background: #ffd700;
            color: #1a472a;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

            .btn:hover {
                transform: scale(1.05);
            }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .book-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

            .book-card:hover {
                transform: translateY(-5px);
            }

        .book-cover {
            height: 180px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .book-info {
            padding: 15px;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1a472a;
        }

        .book-author {
            color: #888;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .book-price {
            font-size: 18px;
            font-weight: bold;
            color: #2d6a4f;
            margin: 10px 0;
        }

        .rating {
            color: #ffd700;
            margin-bottom: 8px;
        }

        .book-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-to-cart {
            flex: 1;
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .wishlist-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group input {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 10px;
            }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background: white;
            z-index: 1500;
            transition: 0.3s;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

            .cart-sidebar.open {
                right: 0;
            }

        .cart-header {
            padding: 15px;
            background: #2d6a4f;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
        }

        .cart-footer {
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2d6a4f;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 3000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        footer {
            background: #0f2b1d;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">📚 BookStore Ultimate</div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="ابحث عن كتاب...">
                    <button onclick="searchBooks()">🔍</button>
                </div>
                <div class="nav-icons">
                    <a href="#" onclick="openLoginModal()">👤</a>
                    <a href="#" onclick="openCart()">🛒 <span id="cartCount">0</span></a>
                </div>
            </div>
        </div>
    </div>

    <div class="hero">
        <div><h1>اكتشف عالم الكتب</h1><button class="btn" onclick="loadBooks()">تسوق الآن</button></div>
    </div>

    <div class="container">
        <div class="books-grid" id="booksGrid">⏳ جاري التحميل...</div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>🔐 تسجيل الدخول</h3><span onclick="closeLoginModal()" style="cursor:pointer;font-size:24px;">&times;</span></div>
            <form id="loginForm">
                <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور" required></div>
                <button type="submit" class="btn" style="width:100%">دخول</button>
            </form>
            <p style="margin-top:15px;text-align:center">✨ تجريبي: <strong>user@bookstore.com</strong> / <strong>user123</strong></p>
            <hr><p style="text-align:center"><a href="#" onclick="showRegister()">📝 ليس لديك حساب؟ سجل الآن</a></p>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>📝 إنشاء حساب</h3><span onclick="closeRegisterModal()" style="cursor:pointer;font-size:24px;">&times;</span></div>
            <form id="registerForm">
                <div class="form-group"><input type="text" id="regName" placeholder="الاسم الكامل" required></div>
                <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="form-group"><input type="tel" id="regPhone" placeholder="رقم الهاتف"></div>
                <div class="form-group"><input type="text" id="regAddress" placeholder="العنوان"></div>
                <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة المرور" required></div>
                <button type="submit" class="btn" style="width:100%">تسجيل</button>
            </form>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header"><h3>🛒 سلة التسوق</h3><span onclick="closeCart()" style="cursor:pointer;font-size:24px;">&times;</span></div>
        <div class="cart-items" id="cartItems"><p style="text-align:center; padding:30px;">السلة فارغة</p></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>💰 الإجمالي:</span><span id="cartTotal" style="font-size:20px; font-weight:bold;">0.00</span></div>
            <button class="btn" style="width:100%;" onclick="checkout()">💳 إتمام الشراء</button>
        </div>
    </div>

    <footer>© 2026 BookStore Ultimate</footer>

    <script>
    // === التكيف مع البيئة (محلي / إنتاج) ===
    const API_URL = window.location.origin + '/api';
    let token = localStorage.getItem('token');
    let currentUser = null;
    let currentPage = 1;
    let currentCategory = 'all';
    let currentSearch = '';
    let currentSort = 'newest';
    let cart = [];

    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#dc3545' : '#2d6a4f';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // === المصادقة ===
    async function checkAuth() {
        if (!token) return;
        try {
            let res = await fetch(API_URL + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
            let data = await res.json();
            if (data.success) {
                currentUser = data.user;
                document.getElementById('userIcon').innerHTML = '<i class="fas fa-user-check"></i>';
                document.getElementById('logoutBtn').style.display = 'inline';
            } else { localStorage.removeItem('token'); token = null; }
        } catch(e) { console.log(e); }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let email = document.getElementById('loginEmail').value;
        let password = document.getElementById('loginPassword').value;
        try {
            let res = await fetch(API_URL + '/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            let data = await res.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('token', token);
                currentUser = data.user;
                closeLoginModal();
                showToast('✅ تم تسجيل الدخول بنجاح!');
                loadBooks(); loadCart();
            } else { showToast('❌ ' + data.message, true); }
        } catch(err) { showToast('❌ لا يمكن الاتصال بالخادم', true); }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let userData = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value,
            address: document.getElementById('regAddress').value,
            password: document.getElementById('regPassword').value
        };
        try {
            let res = await fetch(API_URL + '/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            let data = await res.json();
            if (data.success) {
                showToast('✅ تم التسجيل بنجاح! يمكنك الدخول الآن');
                closeRegisterModal();
                openLoginModal();
            } else { showToast('❌ ' + data.message, true); }
        } catch(err) { showToast('❌ لا يمكن الاتصال بالخادم', true); }
    });

    function logout() {
        localStorage.removeItem('token');
        token = null; currentUser = null;
        showToast('تم تسجيل الخروج');
        document.getElementById('userIcon').innerHTML = '<i class="fas fa-user"></i>';
        document.getElementById('logoutBtn').style.display = 'none';
        loadBooks();
    }

    // === الكتب ===
    async function loadBooks() {
        let url = API_URL + '/books?page=' + currentPage + '&sort=' + currentSort;
        if (currentCategory !== 'all') url += '&category=' + currentCategory;
        if (currentSearch) url += '&search=' + currentSearch;
        try {
            let res = await fetch(url);
            let data = await res.json();
            if (data.success) displayBooks(data.books);
        } catch(err) {
            document.getElementById('booksGrid').innerHTML = '<div style="text-align:center;color:red;padding:50px">❌ لا يمكن الاتصال بالخادم</div>';
        }
    }

    function displayBooks(books) {
        let grid = document.getElementById('booksGrid');
        if (!books || books.length === 0) { grid.innerHTML = '<div style="text-align:center;padding:50px;">لا توجد كتب</div>'; return; }
        grid.innerHTML = '';
        books.forEach(book => {
            let stars = '★'.repeat(Math.floor(book.rating || 0)) + '☆'.repeat(5 - Math.floor(book.rating || 0));
            grid.innerHTML += `
                <div class="book-card">
                    <div class="book-cover"><i class="fas fa-book"></i> ${book.cover_icon || '📖'}</div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">✍️ ${book.author}</div>
                        <div class="rating">${stars} (${book.rating || 0})</div>
                        <div class="book-price">${book.price_physical} د.ل</div>
                        <div class="book-actions">
                            <button class="add-to-cart" onclick="addToCart(${book.id}, '${book.title.replace(/'/g, "\\'")}')"><i class="fas fa-cart-plus"></i> أضف</button>
                            <button class="wishlist-btn" onclick="addToWishlist(${book.id})"><i class="fas fa-heart"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function searchBooks() { currentSearch = document.getElementById('searchInput').value; currentPage = 1; loadBooks(); }
    function filterByCategory(category) { currentCategory = category; loadBooks(); }
    function scrollToBooks() { document.querySelector('.books-section')?.scrollIntoView({ behavior: 'smooth' }); }

    // === السلة ===
    async function loadCart() {
        if (!token) return;
        let res = await fetch(API_URL + '/cart', { headers: { 'Authorization': 'Bearer ' + token } });
        let data = await res.json();
        if (data.success) { cart = data.cart; displayCart(data.cart, data.total || 0); }
    }

    function displayCart(cartItems, total) {
        let container = document.getElementById('cartItems');
        if (!cartItems || cartItems.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:30px;">السلة فارغة</p>';
            document.getElementById('cartTotal').innerHTML = '0.00';
            document.getElementById('cartCount').innerText = '0';
            return;
        }
        let html = '';
        cartItems.forEach(item => {
            html += `<div class="cart-item"><div><strong>${item.title}</strong><br>${item.price_physical} × ${item.quantity}</div><div><button onclick="updateCartItem(${item.id}, ${item.quantity - 1})" style="background:#ddd;border:none;padding:5px 10px;border-radius:5px;">-</button><span style="margin:0 8px;">${item.quantity}</span><button onclick="updateCartItem(${item.id}, ${item.quantity + 1})" style="background:#ddd;border:none;padding:5px 10px;border-radius:5px;">+</button><button onclick="removeCartItem(${item.id})" style="background:#dc3545;color:white;border:none;padding:5px 10px;border-radius:5px;"><i class="fas fa-trash"></i></button></div></div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerHTML = total.toFixed(2);
        document.getElementById('cartCount').innerText = cartItems.reduce((s,i)=>s+i.quantity,0);
    }

    async function addToCart(bookId, title) {
        if (!token) { showToast('يرجى تسجيل الدخول أولاً', true); openLoginModal(); return; }
        let res = await fetch(API_URL + '/cart/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ bookId, quantity: 1 })
        });
        if (res.ok) { showToast('✅ تم إضافة "' + title + '" إلى السلة'); loadCart(); }
    }

    async function updateCartItem(id, quantity) {
        if (quantity <= 0) { removeCartItem(id); return; }
        await fetch(API_URL + '/cart/update/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ quantity }) });
        loadCart();
    }

    async function removeCartItem(id) {
        await fetch(API_URL + '/cart/remove/' + id, { method: 'DELETE' });
        showToast('تمت الإزالة');
        loadCart();
    }

    async function addToWishlist(bookId) {
        if (!token) { showToast('يرجى تسجيل الدخول أولاً', true); openLoginModal(); return; }
        await fetch(API_URL + '/wishlist/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ bookId })
        });
        showToast('❤️ تمت الإضافة إلى المفضلة');
    }

    async function checkout() {
        if (!token) { showToast('يرجى تسجيل الدخول', true); openLoginModal(); return; }
        let address = prompt('أدخل عنوان الشحن:');
        if (!address) return;
        let res = await fetch(API_URL + '/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ address })
        });
        let data = await res.json();
        if (data.success) showToast('✅ تم إتمام الطلب بنجاح!');
        else showToast('❌ ' + data.message, true);
        closeCart();
    }

    // === دوال النوافذ ===
    function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
    function openRegisterModal() { document.getElementById('registerModal').style.display = 'flex'; }
    function closeRegisterModal() { document.getElementById('registerModal').style.display = 'none'; }
    function showRegister() { closeLoginModal(); openRegisterModal(); }
    function openCart() { document.getElementById('cartSidebar').classList.add('open'); loadCart(); }
    function closeCart() { document.getElementById('cartSidebar').classList.remove('open'); }

    // بدء التشغيل
    checkAuth();
    loadBooks();
    loadCart();
    </script>
</body>
</html>
