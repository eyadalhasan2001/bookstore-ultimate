<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore Ultimate | متجر الكتب</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">📚 BookStore Ultimate</div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="ابحث عن كتاب...">
                    <button onclick="searchBooks()">🔍</button>
                </div>
                <div class="nav-icons">
                    <a href="#" onclick="openLoginModal()"><i class="fas fa-user"></i></a>
                    <a href="#" onclick="openCart()"><i class="fas fa-shopping-cart"></i><span id="cartCount">0</span></a>
                </div>
            </div>
        </div>
    </div>

    <div class="hero">
        <div><h1>اكتشف عالم الكتب</h1><button class="btn" onclick="loadBooks()">تسوق الآن</button></div>
    </div>

    <div class="container">
        <div class="books-grid" id="booksGrid">⏳ جاري التحميل...</div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h3>تسجيل الدخول</h3>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
            <button onclick="login()">دخول</button>
            <p>ليس لديك حساب؟ <a href="#" onclick="openRegisterModal()">سجل الآن</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRegisterModal()">&times;</span>
            <h3>إنشاء حساب جديد</h3>
            <input type="text" id="regName" placeholder="الاسم الكامل" required>
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="regPassword" placeholder="كلمة المرور" required>
            <input type="text" id="regPhone" placeholder="رقم الهاتف">
            <input type="text" id="regAddress" placeholder="العنوان">
            <button onclick="register()">تسجيل</button>
        </div>
    </div>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>سلة التسوق</h3>
            <span class="close" onclick="closeCart()">&times;</span>
        </div>
        <div class="cart-items" id="cartItems">السلة فارغة</div>
        <div class="cart-footer">
            <div>الإجمالي: <span id="cartTotal">0.00</span> د.ل</div>
            <button onclick="checkout()">إتمام الشراء</button>
        </div>
    </div>

    <footer>© 2026 BookStore Ultimate</footer>

    <script src="/js/main.js"></script>
</body>
</html>
